## Is your feature request related to a problem?

A clear description of what the problem is. (e.g., "I need GCompris to support X but the role doesn't expose a variable for it...")

## Proposed solution

A clear description of what you want to happen.

## Alternatives considered

Any alternative solutions or features you've considered.

## Additional context

Any other context, screenshots, or references.

## Checklist

- [ ] I have searched existing issues to ensure this is not a duplicate
- [ ] This feature fits the role's scope (GCompris kiosk provisioning on Raspberry Pi)
- [ ] I am willing to help test this feature if implemented

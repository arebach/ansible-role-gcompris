# GCompris RPi Kiosk — CI/CD Pipeline
# ======================================
# GitHub Actions workflow for automated testing and deployment.
#
# Pipeline Stages:
#   1. Lint: ansible-lint on the role
#   2. Test: Molecule test suite (Docker container)
#   3. Deploy: Publish to Ansible Galaxy (if release)
#
# Required Secrets:
#   - GALAXY_API_KEY: Ansible Galaxy API token for publishing

name: GCompris RPi Kiosk CI/CD

on:
  push:
    branches: [main]
    paths:
      - "roles/arebach/gcompris_rpi_kiosk/**"
      - ".github/workflows/**"
      - "galaxy.yml"
  pull_request:
    branches: [main]
    paths:
      - "roles/arebach/gcompris_rpi_kiosk/**"
      - ".github/workflows/**"
      - "galaxy.yml"

env:
  ANSIBLE_FORCE_COLOR: "true"
  PY_COLORS: "1"

jobs:
  # ── Job 1: Lint ────────────────────────────────────────────────
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          path: gcompris-role

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ansible-lint
        run: |
          python -m pip install --upgrade pip
          pip install ansible-lint

      - name: Run ansible-lint
        working-directory: gcompris-role
        run: |
          ansible-lint roles/arebach/gcompris_rpi_kiosk/
          echo "Linting completed successfully"

  # ── Job 2: Test ────────────────────────────────────────────────
  test:
    name: Molecule Test Suite
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          path: gcompris-role

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Ansible and Molecule
        run: |
          python -m pip install --upgrade pip
          pip install ansible molecule molecule-plugins[docker] ansible-lint

      - name: Install Molecule Docker driver
        run: |
          pip install molecule-plugins[docker]

      - name: Run Molecule test
        working-directory: gcompris-role/roles/arebach/gcompris_rpi_kiosk/molecule/default
        run: |
          molecule test --destroy=always
        env:
          DOCKER_HOST: "unix:///var/run/docker.sock"

  # ── Job 3: Deploy ──────────────────────────────────────────────
  deploy:
    name: Publish to Ansible Galaxy
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Publish to Ansible Galaxy
        uses: ansible/ansible-galaxy-action@v1
        with:
          galaxy_api_key: ${{ secrets.GALAXY_API_KEY }}
          role_path: roles/arebach/gcompris_rpi_kiosk

# GCompris RPi Kiosk — CI/CD Pipeline
# ======================================
# GitHub Actions workflow for automated testing and deployment.
#
# Pipeline Stages:
#   1. Lint: ansible-lint on the role
#   2. Test: Molecule test suite (Docker container)
#   3. Deploy: Publish to Ansible Galaxy (if release)
#
# Required Secrets:
#   - GALAXY_API_KEY: Ansible Galaxy API token for publishing

name: GCompris RPi Kiosk CI/CD

on:
  push:
    branches: [main]
    paths:
      - "roles/arebach/gcompris_rpi_kiosk/**"
      - ".github/workflows/**"
      - "galaxy.yml"
  pull_request:
    branches: [main]
    paths:
      - "roles/arebach/gcompris_rpi_kiosk/**"
      - ".github/workflows/**"
      - "galaxy.yml"
  workflow_dispatch:

env:
  ANSIBLE_FORCE_COLOR: "true"
  PY_COLORS: "1"

jobs:
  # ── Job 1: Lint ────────────────────────────────────────────────
  lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          path: gcompris-role

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install ansible-lint
        run: |
          python -m pip install --upgrade pip
          pip install ansible-lint

      - name: Run ansible-lint
        working-directory: gcompris-role
        run: |
          ansible-lint roles/arebach/gcompris_rpi_kiosk/
          echo "Linting completed successfully"

  # ── Job 2: Test ────────────────────────────────────────────────
  test:
    name: molecule
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          path: gcompris-role

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install Ansible and Molecule
        run: |
          python -m pip install --upgrade pip
          pip install ansible molecule molecule-plugins[docker] ansible-lint passlib

      - name: Install Molecule Docker driver
        run: |
          pip install molecule-plugins[docker]

      - name: Install community.general collection
        run: |
          ansible-galaxy collection install community.general

      - name: Run Molecule test
        working-directory: gcompris-role/roles/arebach/gcompris_rpi_kiosk
        run: |
          molecule test
        env:
          DOCKER_HOST: "unix:///var/run/docker.sock"

  # ── Job 3: Deploy ──────────────────────────────────────────────
  deploy:
    name: Publish to Ansible Galaxy
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install ansible-galaxy-cli
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Build collection
        run: |
          ansible-galaxy collection build --force

      - name: Publish to Ansible Galaxy
        env:
          GALAXY_API_KEY: ${{ secrets.GALAXY_API_KEY }}
        run: |
          ansible-galaxy collection publish arebach-gcompris_rpi_kiosk-*.tar.gz \
            --server https://galaxy.ansible.com \
            --token "$GALAXY_API_KEY" \
            --verbose

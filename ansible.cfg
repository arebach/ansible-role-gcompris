# Ansible Configuration for GCompris RPi Kiosk Role
# ====================================================
# Points Ansible to the local roles directory so playbooks
# can reference 'arebach.gcompris_rpi_kiosk' without installing
# from Galaxy first.

[defaults]
roles_path = ./roles
collections_paths = ./ansible_collections

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

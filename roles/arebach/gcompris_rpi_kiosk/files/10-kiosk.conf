# GCompris RPi Kiosk — X11 Security Server Flags
# ==================================================
# Deployed to: /etc/X11/xorg.conf.d/10-kiosk.conf
#
# Disables dangerous X11 key combinations that could allow a child
# (or anyone) to escape the kiosk session:
#   - Ctrl+Alt+Fn:  Switch virtual terminals (TTY access)
#   - Ctrl+Alt+Backspace: Kill X server
#   - Alt+F4, Alt+Tab: Window switching (blocked at WM level,
#     but X11 flags provide a second layer)
#
# These are standard kiosk lockdown flags — they don't affect
# normal mouse/keyboard/keyboard usage for play.
#
Section "ServerFlags"
    Option "DontVTSwitch" "true"
    Option "DontZap" "true"
EndSection

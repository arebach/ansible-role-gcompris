# GCompris RPi Kiosk — Molecule Default Converge Playbook
# =========================================================
# Applies the gcompris_rpi_kiosk role to the test container.
# Uses a relative path to the role directory so molecule works
# without requiring the role to be published to Galaxy first.

---
- name: Converge GCompris RPi Kiosk role
  hosts: all
  become: true
  vars:
    gcompris_rpi_kiosk_network_mode: "internal"
    gcompris_rpi_kiosk_reboot: false  # never reboot inside Docker containers
    gcompris_rpi_kiosk_update_system: false  # skip apt dist-upgrade in CI
    gcompris_rpi_kiosk_force_x11: false  # no raspi-config or /boot/firmware in Docker
    gcompris_rpi_kiosk_user_groups: ""  # RPi hardware groups don't exist in Docker
  roles:
    - role: "{{ playbook_dir }}/../.."  # noqa: role-name[path]

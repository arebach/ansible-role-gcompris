# GCompris RPi Kiosk — Molecule Test Configuration
# ==================================================
# Tests the role inside a Docker container running Debian 12
# (Bookworm) to verify configuration file generation.
# Uses a plain Debian image (no systemd) since verify checks
# are static file existence/content assertions only.

---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: rpi-os-bookworm-test
    image: debian:bookworm
    privileged: true
    command: "sleep infinity"
    tmpfs:
      - "/run"
      - "/tmp"

provisioner:
  name: ansible
  env:
    ANSIBLE_REMOTE_TMP: /tmp
    ANSIBLE_PYTHON_INTERPRETER: /usr/bin/python3
  playbooks:
    verify: ../default/verify.yml

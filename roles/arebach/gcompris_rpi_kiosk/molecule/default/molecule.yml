# GCompris RPi Kiosk — Molecule Test Configuration
# ==================================================

---
driver:
  name: docker

platforms:
  - name: rpi-os-bookworm-test
    image: debian:bookworm
    privileged: true
    command: "sleep infinity"
    tmpfs:
      - "/run"
      - "/tmp"

provisioner:
  name: ansible
  env:
    ANSIBLE_REMOTE_TMP: /tmp
    ANSIBLE_PYTHON_INTERPRETER: /usr/bin/python3
  playbooks:
    verify: verify.yml

scenario:
  test_sequence:
    - syntax
    - create
    - converge
    - verify
    - cleanup
    - destroy

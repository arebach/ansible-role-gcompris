# GCompris RPi Kiosk — Molecule Test Configuration
# ==================================================
# Tests the role inside a privileged Docker container running Debian 12
# (Bookworm) to simulate the target Raspberry Pi OS environment.

---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: rpi-os-bookworm-test
    image: geerlingguy/docker-debian12-ansible
    privileged: true
    command: "/lib/systemd/systemd"
    volumes:
      - "/sys/fs/cgroup:/sys/fs/cgroup:rw"
    tmpfs:
      - "/run"
      - "/run/lock"
    capabilities:
      - "SYS_ADMIN"

provisioner:
  name: ansible
  playbooks:
    verify: ../default/verify.yml

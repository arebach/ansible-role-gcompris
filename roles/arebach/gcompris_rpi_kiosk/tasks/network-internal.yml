# GCompris Kiosk — Network: Internal-Only Mode
# ================================================
# gcompris_network_mode: internal
#
# Network stack remains active but internet is blocked.
# Only RFC1918 private ranges are allowed on common ports.
# This protects children from internet content while allowing:
#   - LAN game servers / multiplayer
#   - Local media sharing
#   - Internal DNS (for library school networks)
#   - SSH to local admin machines
#
# Internet-sourced content (A/V packs, cloud saves) blocked.

---
- name: Ensure UFW is installed and enabled for internal mode
  ansible.builtin.apt:
    name: "ufw"
    state: "present"
    update_cache: true

- name: Set UFW default policies (deny all incoming, allow outgoing)
  ansible.builtin.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: "incoming", policy: "deny" }
    - { direction: "outgoing", policy: "allow" }

- name: Apply permissive rules for internal/private traffic
  ansible.builtin.ufw:
    rule: "{{ item.rule }}"
    from_addr: "{{ item.from }}"
    to_port: "{{ item.port }}"
  loop:
  loop:
    # Allow DNS for internal DNS servers (10.x, 172.x, 192.168.x)
    - { rule: "allow", from: "10.0.0.0/8", port: "53" }
    - { rule: "allow", from: "172.16.0.0/12", port: "53" }
    - { rule: "allow", from: "192.168.0.0/16", port: "53" }
    # Allow DHCP
    - { rule: "allow", from: "10.0.0.0/8", port: "67" }
    - { rule: "allow", from: "172.16.0.0/12", port: "67" }
    - { rule: "allow", from: "192.168.0.0/16", port: "67" }
    # Allow SSH (internal only)
    - { rule: "allow", from: "10.0.0.0/8", port: "22" }
    - { rule: "allow", from: "172.16.0.0/12", port: "22" }
    - { rule: "allow", from: "192.168.0.0/16", port: "22" }
    # Allow RDP (internal only)
    - { rule: "allow", from: "10.0.0.0/8", port: "3389" }
    - { rule: "allow", from: "172.16.0.0/12", port: "3389" }
    - { rule: "allow", from: "192.168.0.0/16", port: "3389" }
    # Allow HTTP/HTTPS (internal only)
    - { rule: "allow", from: "10.0.0.0/8", port: "80" }
    - { rule: "allow", from: "10.0.0.0/8", port: "443" }
    - { rule: "allow", from: "172.16.0.0/12", port: "80" }
    - { rule: "allow", from: "172.16.0.0/12", port: "443" }
    - { rule: "allow", from: "192.168.0.0/16", port: "80" }
    - { rule: "allow", from: "192.168.0.0/16", port: "443" }
  notify: Reload UFW Firewall

- name: Enable UFW
  ansible.builtin.command:
    cmd: "ufw --force enable"
  changed_when: true

- name: Block outbound internet traffic (DROP non-RFC1918 on web ports)
  ansible.builtin.iptables:
    chain: OUTPUT
    destination: "{{ item.dest }}"
    protocol: "{{ item.proto }}"
    destination_port: "{{ item.port }}"
    jump: DROP
  loop:
    - { dest: "0.0.0.0/0", proto: "tcp", port: "80" }
    - { dest: "0.0.0.0/0", proto: "tcp", port: "443" }
    - { dest: "0.0.0.0/0", proto: "udp", port: "53" }
  # NOTE: These rules block outbound HTTP/HTTPS/DNS to ALL addresses.
  # UFW rules above already allowed these ports for RFC1918 ranges,
  # so internal traffic flows; internet traffic is dropped here.
  # iptables processes UFW rules first, then these as a catch-all.

- name: Allow established internal connections
  ansible.builtin.iptables:
    chain: OUTPUT
    ctstate: "ESTABLISHED,RELATED"
    jump: ACCEPT

- name: Disable Bluetooth (reduce wireless attack surface)
  ansible.builtin.systemd:
    name: "bluetooth.service"
    state: "stopped"
    enabled: false
  ignore_errors: true

- name: Deploy network status indicator script
  ansible.builtin.copy:
    content: |
      #!/bin/bash
      # Display current network mode in status bar
      echo "Internal-only network active"
    dest: "/usr/local/bin/gcompris-network-status.sh"
    owner: "root"
    group: "root"
    mode: "0755"
  ignore_errors: true

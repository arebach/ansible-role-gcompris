# GCompris Kiosk — Network: Internal-Only Mode
# ================================================
# gcompris_network_mode: internal
#
# Network stack remains active but internet is blocked.
# Only RFC1918 private ranges are allowed on common ports.
# This protects children from internet content while allowing:
#   - LAN game servers / multiplayer
#   - Local media sharing
#   - Internal DNS (for library school networks)
#   - SSH to local admin machines
#
# Internet-sourced content (A/V packs, cloud saves) blocked.

---
- name: Ensure UFW is installed for internal mode
  ansible.builtin.apt:
    name: "ufw"
    state: "present"
    update_cache: true

- name: Set UFW default policies (deny incoming, deny outgoing)
  ansible.builtin.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: "incoming", policy: "deny" }
    - { direction: "outgoing", policy: "deny" }

- name: Allow outbound DNS to internal servers
  ansible.builtin.ufw:
    rule: "allow"
    direction: "out"
    to_addr: "{{ item.net }}"
    to_port: "53"
    proto: "any"
  loop:
    - { net: "10.0.0.0/8" }
    - { net: "172.16.0.0/12" }
    - { net: "192.168.0.0/16" }

- name: Allow outbound DHCP to internal servers
  ansible.builtin.ufw:
    rule: "allow"
    direction: "out"
    to_addr: "{{ item.net }}"
    to_port: "67"
    proto: "any"
  loop:
    - { net: "10.0.0.0/8" }
    - { net: "172.16.0.0/12" }
    - { net: "192.168.0.0/16" }

- name: Allow outbound SSH to internal servers
  ansible.builtin.ufw:
    rule: "allow"
    direction: "out"
    to_addr: "{{ item.net }}"
    to_port: "22"
    proto: "tcp"
  loop:
    - { net: "10.0.0.0/8" }
    - { net: "172.16.0.0/12" }
    - { net: "192.168.0.0/16" }

- name: Allow outbound HTTP/HTTPS to internal servers
  ansible.builtin.ufw:
    rule: "allow"
    direction: "out"
    to_addr: "{{ item.net }}"
    to_port: "{{ item.port }}"
    proto: "tcp"
  loop:
    - { net: "10.0.0.0/8", port: "80" }
    - { net: "10.0.0.0/8", port: "443" }
    - { net: "172.16.0.0/12", port: "80" }
    - { net: "172.16.0.0/12", port: "443" }
    - { net: "192.168.0.0/16", port: "80" }
    - { net: "192.168.0.0/16", port: "443" }

- name: Allow outbound RDP to internal servers
  ansible.builtin.ufw:
    rule: "allow"
    direction: "out"
    to_addr: "{{ item.net }}"
    to_port: "3389"
    proto: "tcp"
  loop:
    - { net: "10.0.0.0/8" }
    - { net: "172.16.0.0/12" }
    - { net: "192.168.0.0/16" }

- name: Allow inbound from internal ranges (SSH for admin)
  ansible.builtin.ufw:
    rule: "allow"
    direction: "in"
    from_addr: "{{ item.net }}"
    to_port: "22"
    proto: "tcp"
  loop:
    - { net: "10.0.0.0/8" }
    - { net: "172.16.0.0/12" }
    - { net: "192.168.0.0/16" }

- name: Enable UFW
  ansible.builtin.command:
    cmd: "ufw --force enable"
  changed_when: true

- name: Disable Bluetooth (reduce wireless attack surface)
  ansible.builtin.systemd:
    name: "bluetooth.service"
    state: "stopped"
    enabled: false
  ignore_errors: true

- name: Deploy network status indicator script
  ansible.builtin.copy:
    content: |
      #!/bin/bash
      # Display current network mode in status bar
      echo "Internal-only network active"
    dest: "/usr/local/bin/gcompris-network-status.sh"
    owner: "root"
    group: "root"
    mode: "0755"
  ignore_errors: true

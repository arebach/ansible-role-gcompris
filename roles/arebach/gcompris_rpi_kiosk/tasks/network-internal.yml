# GCompris Kiosk — Network: Internal-Only Mode
# ================================================
# gcompris_rpi_kiosk_network_mode: internal
#
# Network stack remains active but internet is blocked.
# Only RFC1918 private ranges are allowed on common ports.
# This protects children from internet content while allowing:
#   - LAN game servers / multiplayer
#   - Local media sharing
#   - Internal DNS (for library school networks)
#   - SSH to local admin machines
#
# Internet-sourced content (A/V packs, cloud saves) blocked.

---
- name: Ensure UFW is installed for internal mode
  ansible.builtin.apt:
    name: "ufw"
    state: "present"
    update_cache: false

- name: Set UFW default policy — deny incoming
  community.general.ufw:
    direction: "incoming"
    policy: "deny"

- name: Set UFW default policy — deny outgoing
  community.general.ufw:
    direction: "outgoing"
    policy: "deny"

- name: Allow outbound DNS to internal servers
  community.general.ufw:
    rule: "allow"
    direction: "out"
    to_ip: "{{ item.net }}"
    to_port: "53"
    proto: "any"
  loop:
    - { net: "10.0.0.0/8" }
    - { net: "172.16.0.0/12" }
    - { net: "192.168.0.0/16" }

- name: Allow outbound DHCP to internal servers
  community.general.ufw:
    rule: "allow"
    direction: "out"
    to_ip: "{{ item.net }}"
    to_port: "67"
    proto: "any"
  loop:
    - { net: "10.0.0.0/8" }
    - { net: "172.16.0.0/12" }
    - { net: "192.168.0.0/16" }

- name: Allow outbound SSH to internal servers
  community.general.ufw:
    rule: "allow"
    direction: "out"
    to_ip: "{{ item.net }}"
    to_port: "22"
    proto: "tcp"
  loop:
    - { net: "10.0.0.0/8" }
    - { net: "172.16.0.0/12" }
    - { net: "192.168.0.0/16" }

- name: Allow outbound HTTP/HTTPS to internal servers
  community.general.ufw:
    rule: "allow"
    direction: "out"
    to_ip: "{{ item.net }}"
    to_port: "{{ item.port }}"
    proto: "tcp"
  loop:
    - { net: "10.0.0.0/8", port: "80" }
    - { net: "10.0.0.0/8", port: "443" }
    - { net: "172.16.0.0/12", port: "80" }
    - { net: "172.16.0.0/12", port: "443" }
    - { net: "192.168.0.0/16", port: "80" }
    - { net: "192.168.0.0/16", port: "443" }

- name: Allow outbound RDP to internal servers
  community.general.ufw:
    rule: "allow"
    direction: "out"
    to_ip: "{{ item.net }}"
    to_port: "3389"
    proto: "tcp"
  loop:
    - { net: "10.0.0.0/8" }
    - { net: "172.16.0.0/12" }
    - { net: "192.168.0.0/16" }

- name: Allow inbound from internal ranges (SSH for admin)
  community.general.ufw:
    rule: "allow"
    direction: "in"
    from_ip: "{{ item.net }}"
    to_port: "22"
    proto: "tcp"
  loop:
    - { net: "10.0.0.0/8" }
    - { net: "172.16.0.0/12" }
    - { net: "192.168.0.0/16" }

- name: Enable UFW via config file
  ansible.builtin.lineinfile:
    path: "/etc/ufw/ufw.conf"
    regexp: "^ENABLED="
    line: "ENABLED=yes"
    create: false

- name: Restart UFW service (non-blocking to avoid hang)
  ansible.builtin.systemd:
    name: "ufw"
    state: "restarted"
    enabled: true
    no_block: true
  register: gcompris_rpi_kiosk_ufw_restart
  changed_when: false
  failed_when: false

- name: Wait for UFW to become active (3 retries, 5s delay)
  ansible.builtin.service_facts:
  register: gcompris_rpi_kiosk_ufw_facts
  changed_when: false
  retries: 3
  delay: 5
  until: >-
    (ansible_facts.services | default({}))
    | dict2items
    | selectattr('key', 'match', '^ufw')
    | selectattr('value.state', 'equalto', 'running')
    | list | length > 0
  failed_when: false

- name: Warn if UFW did not activate (fail-forward)
  ansible.builtin.debug:
    msg: >-
      WARNING: UFW did not activate after 3 attempts.
      Firewall rules are written to /etc/ufw/ufw.conf and will apply
      on next reboot. Kiosk continuing without active firewall —
      manual intervention recommended.
  when: >-
    gcompris_rpi_kiosk_ufw_facts is failed or
    gcompris_rpi_kiosk_ufw_facts.services | default({})
    | dict2items | selectattr('key', 'match', '^ufw')
    | selectattr('value.state', 'equalto', 'running')
    | list | length == 0

- name: Disable Bluetooth (reduce wireless attack surface)
  ansible.builtin.systemd:
    name: "bluetooth.service"
    state: "stopped"
    enabled: false
  failed_when: false

- name: Deploy network status indicator script
  ansible.builtin.copy:
    content: |
      #!/bin/bash
      # Display current network mode in status bar
      echo "Internal-only network active"
    dest: "/usr/local/bin/gcompris-network-status.sh"
    owner: "root"
    group: "root"
    mode: "0755"
  failed_when: false

# GCompris Kiosk — Network: None (Air-Gapped) Mode
# ===================================================
# gcompris_network_mode: none
#
# Complete air-gap: all network services stopped and disabled.
# This is the maximum security posture — suitable for devices
# in classrooms or public areas where any network access would
# violate policy.
#
# Services disabled (from gcompris_network_services):
#   - WPA Supplicant (Wi-Fi)
#   - NetworkManager (Wi-Fi/Ethernet management)
#   - dhcpcd (DHCP client)
#   - Bluetooth (radio)
#   - ModemManager (cellular)
#
# Result: The device cannot reach any network — not LAN, not internet.

---
- name: Stop and disable network services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: "stopped"
    enabled: false
  loop: "{{ gcompris_network_services }}"
  ignore_errors: true  # Some services may not exist on minimal installs

- name: Mask network services to prevent restart
  ansible.builtin.systemd:
    name: "{{ item }}"
    masked: true
  loop: "{{ gcompris_network_services }}"
  ignore_errors: true

- name: Disable USB networking (prevent Ethernet via USB adapter)
  ansible.builtin.lineinfile:
    path: "/etc/modprobe.d/gcompris-no-usb-net.conf"
    line: "install usbnet /bin/true"
    create: true
    mode: "0644"
  ignore_errors: true

- name: Deploy air-gapped status indicator
  ansible.builtin.copy:
    content: |
      #!/bin/bash
      # Display air-gapped status
      echo "Air-gapped — no network access"
    dest: "/usr/local/bin/gcompris-network-status.sh"
    owner: "root"
    group: "root"
    mode: "0755"
  ignore_errors: true

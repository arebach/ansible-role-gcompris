# GCompris RPi Kiosk Role — Role Variables
# ==========================================
# These variables have higher precedence than defaults and should not
# typically be overridden by deployment teams.
#
# ── Package Dependencies ──────────────────────────────────────────
# Core packages required for kiosk operation and GCompris runtime.
#
gcompris_packages:
  # GCompris main package
  - gcompris
  # Fullscreen and kiosk support
  - x11-utils
  - x11-xserver-utils
  # Autologin display manager
  - lightdm
  # Input / touchscreen support
  - tslib
  # Screen blanking prevention
  - xscreensaver
  # HDMI override utilities (tvservice is part of libraspberrypi-bin)
  - libraspberrypi-bin
  # Network filtering (for "internal" mode)
  - iptables
  - ufw

# ── LightDM Greeter Theme ────────────────────────────────────────
# Use the simplest greeter to avoid distractions
gcompris_lightdm_greeter: lightdm-gtk-greeter

# ── Network Modes ─────────────────────────────────────────────────
# Firewall rules applied when gcompris_network_mode == "internal"
gcompris_allowed_internal_ports:
  - 53   # DNS
  - 67   # DHCP
  - 68   # DHCP
  - 80   # HTTP (internal)
  - 443  # HTTPS (internal)
  - 22   # SSH (internal only)
  - 3389 # RDP (internal)
  - 8080 # Local proxy

# Network services to stop/disable in "none" (air-gapped) mode
gcompris_network_services:
  - wpa_supplicant.service
  - NetworkManager.service
  - dhcpcd.service
  - bluetooth.service

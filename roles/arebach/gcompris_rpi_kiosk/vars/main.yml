# GCompris RPi Kiosk Role — Role Variables
# ==========================================
# These variables have higher precedence than defaults and should not
# typically be overridden by deployment teams.
#
# ── Package Dependencies ──────────────────────────────────────────
# Core packages required for kiosk operation and GCompris runtime.
#
gcompris_packages:
  # GCompris main package (Qt version)
  - gcompris-qt
  # Fullscreen and kiosk support
  - x11-utils
  - x11-xserver-utils
  # Autologin display manager
  - lightdm
  # Input / touchscreen support
  - tslib
  # HDMI override utilities (tvservice is part of libraspberrypi-bin)
  - libraspberrypi-bin
  # Network filtering (for "internal" mode)
  - iptables
  - ufw

# ── Network Services ──────────────────────────────────────────────
# Services stopped/disabled in "none" (air-gapped) mode
gcompris_network_services:
  - wpa_supplicant.service
  - NetworkManager.service
  - dhcpcd.service
  - bluetooth.service
  - ModemManager.service

# GCompris RPi Kiosk — Deployment Variables (Example)
# ======================================================
# Override defaults for your deployment.
# Reference: roles/arebach/gcompris_rpi_kiosk/defaults/main.yml
#
# To use: ansible-playbook -i inventory.yml playbooks/provision.yml \
#         -e @vars/deployment.yml

# Network access: "full", "internal", or "none"
# Recommended: "internal" for classrooms (LAN games work, no internet)
gcompris_rpi_kiosk_network_mode: "internal"

# Kiosk mode: true or false
# Recommended: yes for dedicated devices
gcompris_rpi_kiosk_mode: true

# Age filtering: restrict activities for younger children
# 0 = all ages (2-12), 9 = only advanced activities
# Example: min=0 max=5 for ages 2-7
gcompris_rpi_kiosk_min_age_level: 0
gcompris_rpi_kiosk_max_age_level: 5

# Kiosk user (change if needed)
gcompris_rpi_kiosk_user: "kiosk"

# Touchscreen support (set true for official RPi touch display)
gcompris_rpi_kiosk_enable_touchscreen: false
